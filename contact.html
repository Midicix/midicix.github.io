        <main>
            <div class="typewriter">
                <h1>Contact :</h1>
            </div>
        </main>
        <div class="spawnSection3">
            <form>
                <label>
                    <h5>
                        Nom *
                    </h5>
                    <input type="text" name="name" required minlength="2" maxlength="22">
                    <h5>
                        Prénom *
                    </h5>
                    <input type="text" name="firstName" required minlength="2" maxlength="22">
                    <h5>
                        Date de naissance *
                    </h5>
                    <input type="date" required>
                    <h5>
                        Adresse mail *
                    </h5>
                    <input type="email" required>
                    <h5>
                        Genre
                    </h5>
                    <select>
                        <option>Homme</option>
                        <option>Femme</option>
                        <option>Non Genrée</option>
                    </select>
                </label>
                <input type="submit">
                <h4>
                    * Champs Obligatoires
                </h4>
            </form>
